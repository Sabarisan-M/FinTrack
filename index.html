<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FinanceBook Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR UI EXACT — NO CHANGE */
body {margin:0;font-family:'Sora',sans-serif;background:#0f172a;color:#e2e8f0;}
.page{display:none;height:100vh;}
.page.active{display:flex;}

.sidebar{width:220px;background:#020617;padding:20px;}
.main{flex:1;padding:20px;}

.btn{background:#3b82f6;color:white;padding:8px;border:none;cursor:pointer;border-radius:6px;}
input,select{width:100%;margin-top:6px;padding:6px;border-radius:6px;border:none;}

.card{background:#1e293b;padding:10px;margin-top:10px;border-radius:6px;}
.row{display:grid;grid-template-columns:repeat(5,1fr);padding:6px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <div style="margin:auto">
    <h2>Login</h2>
    <input id="loginUser" placeholder="User"><br>
    <input id="loginPass" placeholder="Pass" type="password"><br>
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="appPage" class="page">

<div class="sidebar">
  <button onclick="showView('dashboard')">Dashboard</button>
  <button onclick="showView('collection')">Collection</button>
  <button onclick="showView('report')">Report</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>Dashboard</h2>

  <input id="cid" placeholder="Customer ID">
  <input id="cname" placeholder="Name">
  <button onclick="addCustomer()" class="btn">Add</button>

  <div id="customerList"></div>
</div>

<!-- CUSTOMER -->
<div id="customerView" style="display:none">
  <button onclick="showView('dashboard')">Back</button>
  <h2 id="custName"></h2>

  <select id="loanType">
    <option>DL</option><option>WL</option><option>ML</option>
  </select>
  <input id="loanAmt" placeholder="Amount">
  <input id="loanInt" placeholder="Interest">
  <button onclick="addLoan()" class="btn">Add Loan</button>

  <div id="loanList"></div>
</div>

<!-- COLLECTION -->
<div id="collection" style="display:none">
  <h2>Collection</h2>
  <button onclick="saveCollection()" class="btn">Save</button>
  <div id="collectionList"></div>
</div>

<!-- REPORT -->
<div id="report" style="display:none">
  <h2>Report</h2>
  <input type="date" id="date">
  <button onclick="loadReport()" class="btn">View</button>
  <div id="reportList"></div>
</div>

</div>
</div>

<script>

// ===== DB =====
const DB = {
  get:k=>JSON.parse(localStorage.getItem(k)||"[]"),
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

// ===== LOGIN =====
function login(){
  if(loginUser.value==="admin" && loginPass.value==="admin123"){
    loginPage.classList.remove("active");
    appPage.classList.add("active");
    showView("dashboard");
  }else alert("Wrong");
}

// ===== NAV =====
function showView(v){
  ["dashboard","customerView","collection","report"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });
  document.getElementById(v).style.display="block";

  if(v==="dashboard") loadCustomers();
  if(v==="collection") loadCollection();
}

// ===== CUSTOMER =====
function addCustomer(){
  let arr=DB.get("customers");
  arr.push({id:cid.value,name:cname.value});
  DB.set("customers",arr);
  loadCustomers();
}

function loadCustomers(){
  let arr=DB.get("customers");
  customerList.innerHTML=arr.map(c=>
    `<div class="card" onclick="openCustomer('${c.id}')">${c.name}</div>`
  ).join("");
}

function openCustomer(id){
  localStorage.setItem("cid",id);
  showView("customerView");

  let c=DB.get("customers").find(x=>x.id==id);
  custName.innerText=c.name;

  let loans=DB.get("loans").filter(l=>l.cid==id);
  loanList.innerHTML=loans.map(l=>
    `<div class="card">${l.type} ₹${l.amt} | Paid ₹${l.paid}</div>`
  ).join("");
}

// ===== LOAN =====
function addLoan(){
  let arr=DB.get("loans");

  arr.push({
    id:Date.now(),
    cid:localStorage.getItem("cid"),
    type:loanType.value,
    amt:Number(loanAmt.value),
    int:Number(loanInt.value),
    paid:0
  });

  DB.set("loans",arr);
  openCustomer(localStorage.getItem("cid"));
}

// ===== COLLECTION =====
function loadCollection(){
  let loans=DB.get("loans");
  let cust=DB.get("customers");

  collectionList.innerHTML=loans.map(l=>{
    let c=cust.find(x=>x.id==l.cid);
    return `
      <div class="card">
        ${c.name} (${l.type})
        <input id="pay-${l.id}">
      </div>
    `;
  }).join("");
}

function saveCollection(){
  let loans=DB.get("loans");
  let pay=DB.get("payments");

  let d=new Date().toISOString().split('T')[0];

  loans.forEach(l=>{
    let v=document.getElementById("pay-"+l.id);
    if(v && v.value){
      let amt=Number(v.value);
      pay.push({lid:l.id,amt,date:d});
      l.paid+=amt;
    }
  });

  DB.set("payments",pay);
  DB.set("loans",loans);

  alert("Saved");
}

// ===== REPORT =====
function loadReport(){
  let d=date.value;
  let pay=DB.get("payments");
  let loans=DB.get("loans");
  let cust=DB.get("customers");

  let html="";

  ["DL","WL","ML"].forEach(t=>{
    html+=`<h3>${t}</h3>`;

    pay.forEach(p=>{
      if(p.date!=d) return;

      let l=loans.find(x=>x.id==p.lid && x.type==t);
      if(!l) return;

      let c=cust.find(x=>x.id==l.cid);

      html+=`
      <div class="row">
        <span>${c.name}</span>
        <span>₹${p.amt}</span>
        <span>₹${Math.round(p.amt*l.int/100)}</span>
        <span>₹${l.paid}</span>
        <span>₹${l.amt-l.paid}</span>
      </div>`;
    });
  });

  reportList.innerHTML=html;
}

// INIT
loadCustomers();

</script>

</body>
</html>
